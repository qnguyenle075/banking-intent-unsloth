model_name: "unsloth/Llama-3.2-3B-Instruct"
max_seq_length: 256
load_in_4bit: true

lora_r: 16
lora_alpha: 32
lora_dropout: 0.0
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

num_epochs: 4
per_device_train_batch_size: 8
gradient_accumulation_steps: 4
learning_rate: 2.0e-4
weight_decay: 0.01
warmup_steps: 15
optimizer: "adamw_8bit"
lr_scheduler_type: "cosine"
seed: 42
fp16: false
bf16: false
logging_steps: 10
group_by_length: true

dataset_name: "PolyAI/banking77"
num_intents: 45
test_size: 0.2
train_data_path: "sample_data/train.csv"
test_data_path: "sample_data/test.csv"
label_map_path: "configs/label_map.json"

output_dir: "outputs/banking-intent-llama32"
save_total_limit: 2
